<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ankit | Pro Coder</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;700&family=Orbitron:wght@700&display=swap');
        
        body {
            margin: 0;
            padding: 0;
            background-color: #050505;
            background-image: radial-gradient(circle at 50% 50%, #111827 0%, #000000 100%);
            color: #00ffcc;
            font-family: 'Fira Code', monospace;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 85%;
            max-width: 1100px;
            background: rgba(17, 24, 39, 0.7);
            padding: 60px;
            border-radius: 20px;
            box-shadow: 0 0 30px rgba(0, 255, 204, 0.15);
            border: 1px solid rgba(0, 255, 204, 0.3);
            backdrop-filter: blur(10px);
        }

        .text-section {
            flex: 1;
        }

        .greet {
            color: #a855f7;
            font-size: 1.3rem;
            margin-bottom: 10px;
            font-weight: bold;
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 5rem;
            margin: 0;
            color: #fff;
            text-shadow: 0 0 10px #fff, 0 0 20px #00ffcc, 0 0 40px #00ffcc;
        }

        /* Mast Typing Effect */
        .typing-container {
            margin-top: 15px;
            font-size: 1.6rem;
            color: #e5e7eb;
        }

        .typewriter {
            overflow: hidden;
            border-right: .15em solid #a855f7;
            white-space: nowrap;
            margin: 0;
            letter-spacing: .1em;
            animation: typing 3.5s steps(40, end), blink-caret .75s step-end infinite;
        }

        @keyframes typing {
            from { width: 0 }
            to { width: 100% }
        }

        @keyframes blink-caret {
            from, to { border-color: transparent }
            50% { border-color: #a855f7; }
        }

        .btn {
            display: inline-block;
            margin-top: 40px;
            padding: 12px 35px;
            font-family: 'Orbitron', sans-serif;
            font-size: 1.1rem;
            color: #050505;
            background-color: #00ffcc;
            text-decoration: none;
            border-radius: 8px;
            transition: 0.3s;
            box-shadow: 0 0 15px rgba(0, 255, 204, 0.6);
            text-transform: uppercase;
            font-weight: bold;
        }

        .btn:hover {
            box-shadow: 0 0 30px #00ffcc, 0 0 50px #00ffcc;
            transform: scale(1.05);
        }

        .image-section {
            flex: 0.8;
            display: flex;
            justify-content: center;
        }

        /* Cool Glowing & Spinning Image Border */
        .img-box {
            position: relative;
            width: 380px;
            height: 380px;
            border-radius: 50%;
            background: conic-gradient(#00ffcc, #a855f7, #00ffcc);
            padding: 6px;
            animation: spin 6s linear infinite;
            box-shadow: 0 0 40px rgba(168, 85, 247, 0.4);
        }

        .img-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
            border: 6px solid #050505;
            /* Border gol ghumega par image seedhi rahegi */
            animation: unspin 6s linear infinite; 
        }

        @keyframes spin {
            100% { transform: rotate(360deg); }
        }

        @keyframes unspin {
            100% { transform: rotate(-360deg); }
        }

    </style>
</head>
<body>

    <div class="container">
        <div class="text-section">
            <div class="greet">{"< Hello, World! />"}</div>
            <h1>ANKIT</h1>
            <div class="typing-container">
                <p class="typewriter">> Computer Science Engineer_</p>
            </div>
            <a href="#" class="btn">View Git Commits</a>
        </div>
        
        <div class="image-section">
            <div class="img-box">
                <img src="coder-bg.png" alt="Ankit CSE Profile">
            </div>
        </div>
    </div>

</body>
</html>
